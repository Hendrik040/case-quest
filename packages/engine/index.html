<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Case Quest</title>
    <style>
      /* overflow: hidden is load-bearing, not cosmetic: WorldScene clears
         Phaser's keyboard captures (see WorldScene.create) so the pixel UI's
         own `window` keydown handlers actually receive Space/Arrow presses
         instead of finding them already `defaultPrevented`. That trades
         away the browser's default scroll-on-Space/Arrow behavior, which
         this rule suppresses at the CSS level instead. */
      html, body, #root { margin: 0; height: 100%; overflow: hidden; background: #10131a; color: #e6e6e6; font-family: system-ui, sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
